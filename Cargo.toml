[workspace]
members = [
    "crates/mutsuki-bot-protocol",
    "crates/mutsuki-bot-sdk",
    "crates/mutsuki-plugin-bot-event-router",
    "crates/mutsuki-plugin-bot-command",
    "crates/mutsuki-plugin-bot-adapter-qqbot",
    "crates/mutsuki-bot-service-host-integration",
    "crates/mutsuki-bot-testkit",
    "examples/bot-echo",
    "examples/qqbot-echo",
    "examples/service-host-example",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT"
version = "0.1.0"

[workspace.dependencies]
mutsuki-runtime-contracts = { git = "https://github.com/sena-nana/MutsukiCore.git", rev = "cb6527b81b21c8c3c5a9c12cea3445a26b796acf" }
mutsuki-runtime-core = { git = "https://github.com/sena-nana/MutsukiCore.git", rev = "cb6527b81b21c8c3c5a9c12cea3445a26b796acf" }
mutsuki-runtime-host = { git = "https://github.com/sena-nana/MutsukiCore.git", rev = "cb6527b81b21c8c3c5a9c12cea3445a26b796acf" }
mutsuki-runtime-sdk = { git = "https://github.com/sena-nana/MutsukiCore.git", rev = "cb6527b81b21c8c3c5a9c12cea3445a26b796acf" }
mutsuki-service-config = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "ea484aa51af093d2cdfed81656a24e554846b643" }
mutsuki-service-control = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "ea484aa51af093d2cdfed81656a24e554846b643" }
mutsuki-service-ipc = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "ea484aa51af093d2cdfed81656a24e554846b643" }
mutsuki-service-runtime = { git = "https://github.com/sena-nana/MutsukiServiceHost.git", rev = "ea484aa51af093d2cdfed81656a24e554846b643", default-features = false }
mutsuki-bot-protocol = { path = "crates/mutsuki-bot-protocol" }
mutsuki-bot-sdk = { path = "crates/mutsuki-bot-sdk" }
mutsuki-plugin-bot-adapter-qqbot = { path = "crates/mutsuki-plugin-bot-adapter-qqbot" }
mutsuki-plugin-bot-command = { path = "crates/mutsuki-plugin-bot-command" }
mutsuki-plugin-bot-event-router = { path = "crates/mutsuki-plugin-bot-event-router" }
mutsuki-bot-service-host-integration = { path = "crates/mutsuki-bot-service-host-integration" }
mutsuki-bot-testkit = { path = "crates/mutsuki-bot-testkit" }
bot-echo = { path = "examples/bot-echo" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
time = { version = "0.3", features = ["parsing"] }
fastrand = "2.4"
futures-util = "0.3"
html-escape = "0.2"
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls", "stream"] }
tokio = { version = "1", features = ["macros", "net", "rt", "sync", "time"] }
tokio-tungstenite = { version = "0.29", default-features = false, features = ["connect", "rustls-tls-webpki-roots"] }
tracing = "0.1"
url = "2.5"

[profile.dev]
debug = "line-tables-only"
incremental = true

[profile.dev.package."*"]
opt-level = 1
