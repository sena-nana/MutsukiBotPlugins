[workspace]
members = [
    "crates/mutsuki-bot-protocol",
    "crates/mutsuki-bot-sdk",
    "crates/mutsuki-plugin-bot-event-router",
    "crates/mutsuki-plugin-bot-command",
    "crates/mutsuki-plugin-bot-adapter-qqbot",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT"
version = "0.1.0"

[workspace.dependencies]
mutsuki-runtime-contracts = { path = "../NanoBot/crates/mutsuki-runtime-contracts" }
mutsuki-runtime-core = { path = "../NanoBot/crates/mutsuki-runtime-core" }
mutsuki-bot-protocol = { path = "crates/mutsuki-bot-protocol" }
mutsuki-bot-sdk = { path = "crates/mutsuki-bot-sdk" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"

[profile.dev]
debug = "line-tables-only"
incremental = true

[profile.dev.package."*"]
opt-level = 1
